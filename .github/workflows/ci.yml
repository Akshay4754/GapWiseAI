name: GapWise AI — CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ════════════════════════════════════════════════════════════
  # JOB 1 — Run Tests
  # ════════════════════════════════════════════════════════════
  test:
    name: Run Jest Tests
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 — Setup Node.js
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Backend/package-lock.json

      # Step 3 — Install backend dependencies
      - name: Install backend dependencies
        working-directory: Backend
        run: npm ci

      # Step 4 — Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm ci

      # Step 5 — Run tests (pipeline fails if any test fails)
      - name: Run Jest + Supertest tests
        working-directory: Backend
        env:
          NODE_ENV: test
          MONGO_URI: ${{ secrets.MONGO_URI_TEST }}
          JWT_SECRET: test_jwt_secret_for_ci
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm test

  # ════════════════════════════════════════════════════════════
  # JOB 2 — Build & Push Docker Images (only on push to main)
  # ════════════════════════════════════════════════════════════
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test  # only runs if tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      # Step 1 — Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 — Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3 — Set up Docker Buildx (for multi-platform builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4 — Build & Push Backend image
      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/gapwiseai-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/gapwiseai-backend:${{ github.sha }}

      # Step 5 — Build & Push Frontend image
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/gapwiseai-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/gapwiseai-frontend:${{ github.sha }}

      # Step 6 — Summary
      - name: Pipeline Summary
        run: |
          echo "✅ All tests passed"
          echo "🐳 Backend image pushed: ${{ secrets.DOCKER_USERNAME }}/gapwiseai-backend:latest"
          echo "🐳 Frontend image pushed: ${{ secrets.DOCKER_USERNAME }}/gapwiseai-frontend:latest"
