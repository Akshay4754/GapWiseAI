version: "3.9"

services:
  # ── MongoDB ─────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: gapwiseai_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - gapwiseai_network

  # ── Backend (Node.js / Express) ──────────────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: gapwiseai_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./Backend/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/gapwiseai
      - NODE_ENV=production
    depends_on:
      - mongo
    networks:
      - gapwiseai_network

  # ── Frontend (React / Vite → nginx) ─────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: gapwiseai_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - gapwiseai_network

# ── Volumes & Networks ───────────────────────────────────────
volumes:
  mongo_data:

networks:
  gapwiseai_network:
    driver: bridge
